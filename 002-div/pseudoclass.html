<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pseudo-Casses</title>
    <style>
        div{
            display: inline-block; /* TUDO NA MESMA LINHA*/;
            background-color: rgb(189, 182, 182);
            border: 1px solid black; /*BORDA*/
            text-align: center;
            height: 200px; /* ALTURA*/
            width: 200px; /* LARGURA*/
        }

        div:hover{ /* HOUVER=  quando passa o mause por cima iluminar a div*/
            background-color: aqua;
        }

    </style>
</head>
<body>
    <div id="d1">01</div>
    <div id="d2">02</div>
    <div id="d3">03</div>
</body>
</html>
