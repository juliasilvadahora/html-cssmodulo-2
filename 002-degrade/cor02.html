<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradientes em CSS</title>
    <style>
        *{ /*Configurações globlais do CSS**/
            height:100% ;
        }
        
        body{ /*Configurações degrade CSS*/
            background-image: linear-gradient(to top, #B5C1CF, 
            #758AA5, #BDD8FA); /*direita=to RIGHT / esquerda=to LEFT / para cima=to TOP / para baixo=to BOTTOM*/
            background-attachment: fixed; /* cor fica fixa, n fica 
            mudando se voce vai pata baixo*/
        }
    </style>
</head>
<body>
    <h1>Testando Gradientes</h1>
</body>
</html>
